<!DOCTYPE html> <!-- 이 문서는 최신 HTML5 표준 규격으로 작성되었음을 선언합니다. -->
<html lang="ko"> <!-- 시각 장애인용 리더기와 브라우저에게 문서의 기본 언어가 한국어임을 알려줍니다. -->
<head> <!-- 웹페이지의 설정, 제목, 디자인 스타일 등을 정의하는 보이지 않는 머리 부분입니다. -->
    <meta charset="UTF-8"> <!-- 한글과 전 세계의 특수문자, 이모지 등이 깨지지 않도록 유니코드 인코딩을 적용합니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 스마트폰 등 다양한 기기 화면에 맞춰 크기를 자동으로 조절합니다. -->
    <title>나만의 포털 V2</title> <!-- 브라우저 상단 탭에 표시될 우리 프로젝트의 공식 이름입니다. -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" /> <!-- 세련되고 가독성 높은 프리텐다드 폰트를 외부에서 불러옵니다. -->
    <style> /* 외부 파일 없이 단일 파일로 관리하기 위해 모든 CSS 디자인을 내부에 작성합니다. */
        :root { /* 프로젝트 전체에서 반복해서 사용할 테마 색상들을 변수로 만들어 관리를 편하게 합니다. */
            --bg-color: #0f172a; /* 눈이 편안한 다크 모드를 위해 아주 어두운 남색을 메인 배경으로 지정합니다. */
            --glass-bg: rgba(255, 255, 255, 0.05); /* 유리 같은 질감을 내기 위해 5%의 불투명도를 가진 흰색 배경을 만듭니다. */
            --glass-border: rgba(255, 255, 255, 0.1); /* 유리 타일의 미세한 경계선을 표현하기 위해 10% 불투명도의 흰색 선을 긋습니다. */
            --text-main: #f8fafc; /* 어두운 배경 위에서 잘 보이도록 주 텍스트 색상을 아주 밝은 회색으로 설정합니다. */
            --text-muted: #94a3b8; /* 설명글처럼 덜 중요한 텍스트는 시선을 덜 끌도록 어두운 회색으로 설정합니다. */
            --color-a: #22c55e; /* [A구역] 날씨와 할 일을 나타내는 포인트 컬러로 차분한 말차 초록색을 씁니다. */
            --color-b: #f59e0b; /* [B구역] 일상을 기록할 유니버스 구역의 포인트 컬러로 따뜻한 황금 앰버색을 씁니다. */
            --color-c: #a855f7; /* [C구역] 뉴스를 볼 구역의 포인트 컬러로 창의적인 우주 라벤더색을 씁니다. */
            --color-d: #6366f1; /* [D구역] 개발 도구를 모아둘 패널의 포인트 컬러로 신뢰감을 주는 심해 파랑색을 씁니다. */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; } /* 모든 태그의 기본 여백을 지우고, 폰트를 통일하며, 크기 계산을 직관적으로 만듭니다. */
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-x: hidden; } /* 전체 화면의 배경을 칠하고, 내용물을 정중앙에 배치하며, 가로 스크롤을 막습니다. */
        .bento-container { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 1000px; } /* 4개의 구역을 담을 바구니를 격자 형태로 만들고 최대 너비를 제한합니다. */
        @media (min-width: 768px) { .bento-container { grid-template-columns: repeat(2, 1fr); } } /* PC나 태블릿의 넓은 화면에서는 타일을 2열로 나란히 배치합니다. */
        .bento-item { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; height: 300px; display: flex; flex-direction: column; position: relative; overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease; } /* 개별 타일에 글래스모피즘(유리) 디자인과 둥근 모서리를 적용합니다. */
        .bento-item:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); } /* 타일에 마우스를 올렸을 때 살짝 떠오르며 그림자가 지는 입체 효과를 줍니다. */
        .bento-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; } /* 타일 맨 위의 제목 글씨 크기와 굵기를 설정합니다. */
        .zone-indicator { width: 8px; height: 8px; border-radius: 50%; } /* 각 구역의 정체성을 보여주는 작고 동그란 점을 만듭니다. */
        #zone-a .zone-indicator { background-color: var(--color-a); box-shadow: 0 0 10px var(--color-a); } /* A구역 점에 초록색과 빛나는 효과를 줍니다. */
        #zone-b .zone-indicator { background-color: var(--color-b); } /* B구역 점에 앰버색을 적용합니다. */
        #zone-c .zone-indicator { background-color: var(--color-c); } /* C구역 점에 라벤더색을 적용합니다. */
        #zone-d .zone-indicator { background-color: var(--color-d); } /* D구역 점에 파랑색을 적용합니다. */
        .bento-desc { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; } /* 아직 기능이 없는 B,C,D 구역의 설명 문구를 V1 스타일로 렌더링합니다. */
        .a-zone-body { flex: 1; display: flex; justify-content: space-between; align-items: center; gap: 10px; } /* A구역 안쪽을 좌측(날씨)과 우측(일정)으로 반반 나눕니다. */
        .weather-section { flex: 1; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.02); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05); } /* 기상청 날씨가 뜰 왼쪽 박스의 디자인을 설정합니다. */
        .weather-val { font-size: 1.8rem; font-weight: 800; color: var(--color-a); } /* 기온 숫자를 아주 큼직하고 굵은 초록색으로 표시합니다. */
        .weather-icon { font-size: 2.2rem; margin-bottom: 5px; } /* 비나 눈을 알려줄 날씨 이모지를 크게 띄웁니다. */
        .weather-label { font-size: 0.8rem; color: var(--text-muted); } /* 하단에 '현재 기온'이라는 작은 안내글을 붙입니다. */
        .todo-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; } /* 일정 모달을 여는 버튼이 놓일 오른쪽 공간입니다. */
        .todo-icon-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s ease; color: var(--color-a); } /* 누르고 싶게 생긴 큼직한 아이콘 버튼을 디자인합니다. */
        .todo-icon-btn:hover { background: rgba(34, 197, 94, 0.1); transform: translateY(-3px); border-color: var(--color-a); } /* 아이콘 버튼에 마우스를 올리면 색상이 진해지며 떠오릅니다. */
        .todo-label { margin-top: 10px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); } /* 버튼 아래에 '오늘의 일정'이라는 이름을 달아줍니다. */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(8px); } /* 팝업이 뜰 때 뒷배경을 어둡고 흐리게 덮는 가림막입니다. */
        .modal-overlay.active { opacity: 1; visibility: visible; } /* 자바스크립트로 이 클래스를 켜면 숨겨진 팝업이 스르륵 나타납니다. */
        .modal-content { background: #1e293b; border: 1px solid var(--glass-border); border-radius: 24px; width: 95%; max-width: 450px; padding: 25px; transform: scale(0.9); transition: transform 0.3s ease; } /* 실제 팝업창 본체의 색상과 크기, 둥근 모서리를 설정합니다. */
        .modal-overlay.active .modal-content { transform: scale(1); } /* 팝업이 활성화되면 본체 크기가 원래대로 커지며 통통 튀는 느낌을 줍니다. */
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; } /* 팝업창 윗부분의 제목과 X 버튼을 양옆으로 찢어놓습니다. */
        .modal-close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; } /* 창을 닫는 X 버튼의 디자인입니다. */
        .secret-key-group { background: rgba(34, 197, 94, 0.05); padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(34, 197, 94, 0.1); } /* 개인정보를 지킬 암호를 입력하는 보안 구역의 배경을 칠해 강조합니다. */
        .todo-input-group { display: flex; gap: 8px; margin-bottom: 20px; } /* 할 일을 직접 타이핑할 입력창과 추가 버튼을 나란히 배치합니다. */
        .todo-input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px; color: white; outline: none; } /* 글씨를 입력하는 어두운 칸의 디자인입니다. */
        .todo-add-btn { background: var(--color-a); border: none; border-radius: 10px; padding: 0 15px; font-weight: 700; cursor: pointer; color: #000; } /* 정보를 저장하는 초록색 버튼입니다. */
        .todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; margin-bottom: 20px; } /* 수동으로 적은 할 일들이 세로로 쌓이는 목록 영역입니다. */
        .calendar-list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; } /* 구글 캘린더에서 불러온 일정들이 쌓이는 목록 영역입니다. */
        .todo-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; } /* 수동 할 일 1개의 네모난 박스 디자인입니다. */
        .calendar-item { display: flex; flex-direction: column; background: rgba(34, 197, 94, 0.05); padding: 12px; border-radius: 12px; border-left: 4px solid var(--color-a); } /* 구글 일정 1개의 디자인이며 왼쪽에 초록색 띠를 긋습니다. */
        .todo-text { font-size: 0.95rem; } /* 리스트 안의 기본 글씨 크기입니다. */
        .completed .todo-text { text-decoration: line-through; color: var(--text-muted); } /* 할 일을 완료하면 취소선을 긋고 글씨를 흐리게 만듭니다. */
        .todo-delete-btn { color: #f43f5e; background: none; border: none; cursor: pointer; font-size: 0.8rem; } /* 목록에서 지우는 버튼을 빨간색으로 눈에 띄게 만듭니다. */
        .todo-time { font-size: 0.75rem; color: var(--color-a); margin-bottom: 4px; font-weight: 600; } /* 캘린더 일정의 시작 시간을 작고 굵게 표시합니다. */
        .section-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); } /* 캘린더 영역 위쪽에 긋는 연한 구분선과 제목입니다. */
        .loading-text { text-align: center; color: var(--text-muted); padding: 10px; font-size: 0.8rem; } /* 데이터를 불러올 때 나오는 중앙 정렬된 안내 문구입니다. */
    </style>
</head>
<body>
    <div class="bento-container"> <!-- 4개의 타일을 하나로 모아주는 전체 바구니입니다. -->
        
        <!-- [A구역] 날씨 & To-do -->
        <div class="bento-item" id="zone-a"> <!-- 첫 번째 타일 껍데기입니다. -->
            <div class="bento-title"> <!-- 타일 상단에 들어가는 이름표입니다. -->
                <div class="zone-indicator"></div> <!-- 초록색 포인트 점입니다. -->
                날씨 & To-do
            </div>
            <div class="a-zone-body"> <!-- 본문을 좌우로 나누기 위한 틀입니다. -->
                <div class="weather-section" id="weather-area"> <!-- 왼쪽에 위치할 기상청 날씨 판입니다. -->
                    <div id="w-icon" class="weather-icon">⌛</div> <!-- 기상청에서 날씨를 가져오기 전까지 모래시계를 띄웁니다. -->
                    <div id="w-temp" class="weather-val">--</div> <!-- 기온 숫자가 들어올 자리입니다. -->
                    <div class="weather-label">현재 기온</div> <!-- 고정된 텍스트입니다. -->
                </div>
                <div class="todo-section"> <!-- 오른쪽에 위치할 일정 버튼 영역입니다. -->
                    <div class="todo-icon-btn" id="open-todo-btn"> <!-- 클릭하면 상세 창이 열리는 버튼입니다. -->
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <!-- 체크리스트 모양의 벡터 아이콘입니다. -->
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                    </div>
                    <div class="todo-label">오늘의 일정</div> <!-- 아이콘의 이름입니다. -->
                </div>
            </div>
        </div>

        <!-- [B구역] 나의 유니버스 -->
        <div class="bento-item" id="zone-b"> <!-- 두 번째 타일입니다. -->
            <div class="bento-title"><div class="zone-indicator"></div>나의 유니버스</div> <!-- 앰버색 점과 제목입니다. -->
            <div class="bento-desc">일상과 사진이 담길 공간입니다.</div> <!-- 오빠가 승인한 V1 버전의 오리지널 설명 문구입니다. -->
        </div>

        <!-- [C구역] 엑기스 뉴스 -->
        <div class="bento-item" id="zone-c"> <!-- 세 번째 타일입니다. -->
            <div class="bento-title"><div class="zone-indicator"></div>엑기스 뉴스</div> <!-- 라벤더색 점과 제목입니다. -->
            <div class="bento-desc">관심 있는 RSS 피드가 연동될 예정입니다.</div> <!-- 오빠가 승인한 V1 버전의 오리지널 설명 문구입니다. -->
        </div>

        <!-- [D구역] 개발자 패널 -->
        <div class="bento-item" id="zone-d"> <!-- 네 번째 타일입니다. -->
            <div class="bento-title"><div class="zone-indicator"></div>개발자 패널</div> <!-- 파란색 점과 제목입니다. -->
            <div class="bento-desc">서버 상태와 도구들을 배치합니다.</div> <!-- 오빠가 승인한 V1 버전의 오리지널 설명 문구입니다. -->
        </div>
    </div>

    <!-- 숨겨져 있다가 열리는 상세 모달 팝업창 -->
    <div class="modal-overlay" id="modal-a"> <!-- 화면 전체를 덮는 검은 막입니다. -->
        <div class="modal-content"> <!-- 팝업 상자 본체입니다. -->
            <div class="modal-header"> <!-- 팝업의 머리말 영역입니다. -->
                <div class="bento-title" style="margin-bottom:0; font-size: 1rem;"><div class="zone-indicator" style="background-color: var(--color-a);"></div>미션 및 일정 관리</div> <!-- 팝업 제목입니다. -->
                <button class="modal-close-btn" id="close-modal-a">✕</button> <!-- 팝업을 끄는 X 버튼입니다. -->
            </div>
            <div class="modal-body"> <!-- 팝업의 몸통 영역입니다. -->
                <div class="secret-key-group"> <!-- 구글 캘린더 데이터를 보호하기 위한 암호 입력 칸입니다. -->
                    <div style="font-size: 0.75rem; color: var(--color-a); margin-bottom: 5px;">🗝️ 포털 암호 설정 (GAS 연동용)</div> <!-- 안내 문구입니다. -->
                    <div style="display: flex; gap: 5px;"> <!-- 입력창과 버튼을 가로로 배치합니다. -->
                        <input type="password" id="gas-secret-input" class="todo-input" style="padding: 8px;" placeholder="암호를 입력하세요"> <!-- 비밀번호가 별표로 가려지는 입력창입니다. -->
                        <button class="todo-add-btn" id="save-secret-btn" style="padding: 0 10px; font-size: 0.8rem;">저장</button> <!-- 암호를 기기에 기억시키는 버튼입니다. -->
                    </div>
                </div>
                <div class="todo-input-group"> <!-- 오빠가 직접 오늘 할 일을 타이핑하는 구역입니다. -->
                    <input type="text" id="todo-input" class="todo-input" placeholder="새로운 미션을 직접 입력하세요"> <!-- 텍스트 입력창입니다. -->
                    <button class="todo-add-btn" id="todo-add-btn">추가</button> <!-- 리스트에 새 항목을 등록하는 버튼입니다. -->
                </div>
                <ul class="todo-list" id="todo-list"></ul> <!-- 브라우저에 저장된 수동 할 일들이 위에서 아래로 나타나는 뼈대입니다. -->
                <div class="section-title">Google Calendar 일정 (최근 7일)</div> <!-- 구글 일정 구역의 구분선입니다. -->
                <ul class="calendar-list" id="calendar-list"> <!-- 서버에서 받아온 구글 일정이 나타나는 뼈대입니다. -->
                    <div class="loading-text">암호를 저장하면 일정을 불러옵니다.</div> <!-- 초기 상태를 안내합니다. -->
                </ul>
            </div>
        </div>
    </div>

    <script> /* 웹페이지의 뇌 역할을 하는 자바스크립트 영역입니다. 에러 방지를 위해 견고하게 짰습니다. */
        
        // 오빠가 배포 관리에서 새로 부여받은 구글 앱스 스크립트(GAS)의 정확한 주소입니다.
        const GAS_APP_URL = 'https://script.google.com/macros/s/AKfycby0jEFGQp0ijecFEhVv5sYKNbGWBrYkahilhN9nEJj4svr56z5bdhPCCVAynQx2As0e/exec';

        // HTML 태그들을 자바스크립트가 조종할 수 있게 변수로 잡아옵니다.
        const openTodoBtn = document.getElementById('open-todo-btn'); // 모달 열기 버튼
        const modalA = document.getElementById('modal-a'); // 팝업창 전체
        const closeModalBtn = document.getElementById('close-modal-a'); // 팝업 닫기 버튼
        const todoInput = document.getElementById('todo-input'); // 할 일 텍스트 입력칸
        const todoAddBtn = document.getElementById('todo-add-btn'); // 할 일 추가 버튼
        const todoList = document.getElementById('todo-list'); // 할 일이 그려질 리스트
        const calendarList = document.getElementById('calendar-list'); // 캘린더가 그려질 리스트
        const secretInput = document.getElementById('gas-secret-input'); // 암호 입력칸
        const saveSecretBtn = document.getElementById('save-secret-btn'); // 암호 저장 버튼

        // 메인 화면에서 일정 버튼을 클릭했을 때의 동작입니다.
        openTodoBtn.addEventListener('click', () => {
            modalA.classList.add('active'); // 팝업을 부드럽게 화면에 띄웁니다.
            todoInput.focus(); // 오빠가 바로 타자를 칠 수 있게 깜빡이는 커서를 둡니다.
            
            try { // 미리보기 창처럼 로컬 스토리지 권한이 막힌 곳에서 터지는 것을 방지합니다.
                const savedKey = localStorage.getItem('v2_gas_secret'); // 기기에서 기존 암호를 꺼내옵니다.
                if (savedKey) { // 암호가 이미 저장되어 있다면
                    secretInput.value = savedKey; // 암호 입력칸을 자동으로 채워주고
                    fetchCalendarEvents(); // 구글 캘린더 일정을 즉시 가져옵니다.
                }
            } catch (e) { console.warn("LocalStorage access denied"); } // 권한 에러 시 조용히 넘어갑니다.
        });

        // X 버튼을 누르면 팝업을 닫습니다.
        closeModalBtn.addEventListener('click', () => { modalA.classList.remove('active'); });
        // 팝업 바깥쪽의 어두운 배경을 눌러도 팝업이 닫히게 하여 편리함을 줍니다.
        modalA.addEventListener('click', (e) => { if (e.target === modalA) modalA.classList.remove('active'); });

        // 모달창 상단에서 암호 저장 버튼을 클릭했을 때의 동작입니다.
        saveSecretBtn.addEventListener('click', () => {
            const key = secretInput.value.trim(); // 오빠가 입력한 암호의 양옆 공백을 자릅니다.
            if (key) { // 공백이 아니라면
                try {
                    localStorage.setItem('v2_gas_secret', key); // 브라우저 금고에 암호를 영구 저장합니다.
                    fetchCalendarEvents(); // 저장 즉시 일정을 새로고침합니다.
                } catch (e) { alert("브라우저 설정으로 인해 암호를 저장할 수 없습니다."); } // 에러 방지용 방패입니다.
            }
        });

        // ------------------ 수동 할 일 로직 ------------------
        let todos = []; // 할 일들을 담을 빈 배열을 만듭니다.
        try { 
            // 이전에 저장해둔 할 일이 있다면 꺼내오고, 파싱에 실패하면 빈 배열을 씁니다.
            todos = JSON.parse(localStorage.getItem('v2_portal_todos')) || []; 
        } catch (e) { console.warn("LocalStorage error"); }

        // 할 일 목록이 변할 때마다 브라우저에 저장하는 함수입니다.
        function save() { 
            try { localStorage.setItem('v2_portal_todos', JSON.stringify(todos)); } catch(e) {} 
        }

        // 배열에 있는 할 일들을 HTML 코드로 만들어서 화면에 그려주는 함수입니다.
        function renderTodos() {
            todoList.innerHTML = ''; // 찌꺼기가 남지 않게 한 번 싹 비웁니다.
            todos.forEach((todo, idx) => { // 배열을 돌면서 하나씩 조립합니다.
                const li = document.createElement('li'); // 리스트 항목(li) 태그를 만듭니다.
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`; // 완료된 항목이면 회색 처리 클래스를 붙입니다.
                // 체크박스와 텍스트, 그리고 삭제 버튼을 한 줄로 예쁘게 만듭니다.
                li.innerHTML = `<div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="toggle(${idx})"><input type="checkbox" ${todo.completed ? 'checked' : ''} style="cursor:pointer;"><span class="todo-text">${todo.text}</span></div><button class="todo-delete-btn" onclick="del(${idx})">삭제</button>`;
                todoList.appendChild(li); // 조립이 끝난 항목을 실제 화면에 붙여 넣습니다.
            });
        }

        // 새 할 일을 등록하는 함수입니다.
        function add() {
            const val = todoInput.value.trim(); // 입력칸의 글씨를 가져옵니다.
            if (val) { // 내용이 있으면
                todos.unshift({ text: val, completed: false }); // 배열의 맨 앞(unshift)에 새 항목을 끼워 넣습니다.
                todoInput.value = ''; // 다음 입력을 위해 입력칸을 비워줍니다.
                save(); renderTodos(); // 브라우저에 저장하고 화면을 다시 그립니다.
            }
        }

        // 체크박스를 누르면 완료 상태를 뒤집어주는(toggle) 함수입니다.
        window.toggle = (idx) => { todos[idx].completed = !todos[idx].completed; save(); renderTodos(); };
        // 삭제 버튼을 누르면 배열에서 그 항목을 1개 잘라내는(splice) 함수입니다.
        window.del = (idx) => { todos.splice(idx, 1); save(); renderTodos(); };

        // 추가 버튼 클릭 이벤트와 연결합니다.
        todoAddBtn.addEventListener('click', add);
        // 입력창에서 엔터(Enter) 키를 쳐도 추가되도록 이벤트를 연결합니다.
        todoInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') add(); });

        // ------------------ 기상청 날씨 통신 로직 ------------------
        
        // 내 GPS 위경도 좌표를 기상청 서버가 쓰는 '격자 번호(nx, ny)'로 바꿔주는 복잡한 수학 공식입니다. (수정 금지)
        function dfs_xy_conv(v1, v2) {
            const RE = 6371.00877; const GRID = 5.0; const SLAT1 = 30.0; const SLAT2 = 60.0;
            const OLON = 126.0; const OLAT = 38.0; const XO = 43; const YO = 136;
            const DEGRAD = Math.PI / 180.0; const re = RE / GRID; const slat1 = SLAT1 * DEGRAD;
            const slat2 = SLAT2 * DEGRAD; const olon = OLON * DEGRAD; const olat = OLAT * DEGRAD;
            let sn = Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5);
            sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(sn);
            let sf = Math.tan(Math.PI * 0.25 + slat1 * 0.5);
            sf = Math.pow(sf, sn) * Math.cos(slat1) / sn;
            let ro = Math.tan(Math.PI * 0.25 + olat * 0.5);
            ro = re * sf / Math.pow(ro, sn);
            let ra = Math.tan(Math.PI * 0.25 + (v1) * DEGRAD * 0.5);
            ra = re * sf / Math.pow(ra, sn);
            let theta = v2 * DEGRAD - olon;
            if (theta > Math.PI) theta -= 2.0 * Math.PI;
            if (theta < -Math.PI) theta += 2.0 * Math.PI;
            theta *= sn;
            return { x: Math.floor(ra * Math.sin(theta) + XO + 0.5), y: Math.floor(ro - ra * Math.cos(theta) + YO + 0.5) };
        }

        // 구글 캘린더 일정을 가져오는 비동기 함수입니다.
        async function fetchCalendarEvents() {
            let secretKey = '';
            try { secretKey = localStorage.getItem('v2_gas_secret'); } catch(e){} // 캔버스 에러 방지용 안전망
            if (!secretKey) return; // 암호가 없으면 서버에 물어보지 않고 조용히 종료합니다.
            
            calendarList.innerHTML = '<div class="loading-text">로딩 중...</div>'; // 시각적 피드백을 줍니다.
            try {
                // 오빠의 GAS 서버로 암호를 들고 가서 일정을 요청합니다.
                const response = await fetch(`${GAS_APP_URL}?key=${secretKey}`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                if (!response.ok) throw new Error("HTTP Error"); // 통신 상태가 나쁘면 강제로 에러를 발생시킵니다.
                const data = await response.json(); // 응답을 자바스크립트 객체로 변환합니다.
                
                if (data.error) { // 암호가 틀리거나 서버 에러가 났을 때
                    calendarList.innerHTML = `<div class="loading-text" style="color:#f43f5e;">${data.error}</div>`; 
                    return; 
                }
                renderCalendar(data); // 정상이면 일정을 화면에 그립니다.
            } catch (error) { 
                calendarList.innerHTML = '<div class="loading-text">일정 로드 실패 (통신 장애)</div>'; // 최종 에러 처리
            }
        }

        // 받아온 일정 데이터를 HTML로 예쁘게 그려주는 함수입니다.
        function renderCalendar(events) {
            calendarList.innerHTML = ''; // 찌꺼기를 치웁니다.
            if (!events || events.length === 0) { // 일정이 하나도 없을 때의 안내입니다.
                calendarList.innerHTML = '<div class="loading-text">향후 7일간 일정이 없습니다. 편안한 하루 보내세요!</div>'; 
                return; 
            }
            events.forEach(event => { // 일정이 있으면 하나씩 조립합니다.
                const li = document.createElement('li');
                li.className = 'calendar-item'; // 초록색 띠를 두른 디자인 클래스입니다.
                li.innerHTML = `<div class="todo-time">${event.time}</div><div class="todo-text">${event.text}</div>`; // 시간과 내용을 넣습니다.
                calendarList.appendChild(li); // 화면에 붙입니다.
            });
        }

        // 기상청 날씨를 암호 없이 가져오는 핵심 함수입니다. (페이지 접속 시 바로 실행됨)
        async function initWeather() {
            document.getElementById('w-temp').innerText = "⌛"; // 로딩 중임을 알립니다.
            
            // 🚨 [핵심 에러 방지] 캔버스 미리보기처럼 위치 정보가 아예 차단된 환경인지 먼저 검사합니다!
            if (!("geolocation" in navigator)) { 
                document.getElementById('w-temp').innerText = "LOC X"; // 위치 시스템 자체가 없으면 에러를 띄웁니다.
                return; 
            }

            // 내 브라우저에 GPS 위치를 요청합니다.
            navigator.geolocation.getCurrentPosition(async (pos) => {
                // 승인되면, 가져온 위경도를 기상청 격자 번호로 변환합니다.
                const grid = dfs_xy_conv(pos.coords.latitude, pos.coords.longitude); 
                try {
                    // 암호 없이 'weather' 타입과 좌표만 들고 GAS 서버 통로로 기상청 데이터를 요청합니다.
                    const response = await fetch(`${GAS_APP_URL}?type=weather&nx=${grid.x}&ny=${grid.y}`, { method: 'GET', mode: 'cors', redirect: 'follow' });
                    if (!response.ok) throw new Error("HTTP Error"); // 연결 실패 시 에러 처리
                    const data = await response.json(); // 응답 변환
                    
                    if (data.T1H) { // 기온 데이터가 잘 도착했다면
                        document.getElementById('w-temp').innerText = data.T1H + "°"; // 왼쪽 화면에 기온을 표시합니다.
                        const icons = ["☀️", "🌧️", "🌨️", "❄️", "🌦️"]; // 강수 형태(0~4)에 맞는 날씨 이모지 배열입니다.
                        document.getElementById('w-icon').innerText = icons[parseInt(data.PTY)] || "🌤️"; // 상황에 맞는 이모지로 바꿉니다.
                    } else {
                        document.getElementById('w-temp').innerText = "ERR"; // 데이터 형식이 이상하면 ERR를 띄웁니다.
                    }
                } catch (e) {
                    document.getElementById('w-temp').innerText = "ERR"; // 통신 중 튕기면 ERR를 띄웁니다.
                }
            }, (error) => { 
                // 오빠가 위치 팝업에서 '차단'을 눌렀거나, 브라우저 설정상 위치가 막혀있을 때의 처리입니다.
                document.getElementById('w-temp').innerText = "LOC?"; 
            });
        }

        // --- 프로그램 최초 실행 영역 ---
        renderTodos(); // 화면이 켜지자마자 저장된 수동 할 일을 그립니다.
        initWeather(); // 화면이 켜지자마자 위치를 잡고 날씨를 가져오기 시작합니다.

    </script>
</body>
</html>
